// Map vehicles to images based on body style / brand
function getCarImg(car){
  var bs=car.bs||'';var b=(car.b||'').toLowerCase();
  if(bs==='SUV'){return b.indexOf('mercedes')>-1||b.indexOf('byton')>-1?IMG.suv2:IMG.suv1}
  if(bs==='Sedan'){return b.indexOf('merc')>-1||b.indexOf('bmw')>-1?IMG.sedan2:IMG.sedan1}
  if(bs==='Liftback'||bs==='Hatchback')return IMG.car1;
  if(bs==='Cabrio'||bs==='Pickup')return IMG.car2;
  return IMG.car1;
}

function filt(){return all.filter(function(r){if(F.b&&r.b!==F.b)return 0;if(F.bs&&r.bs!==F.bs)return 0;if(F.sg&&r.sg!==F.sg)return 0;if(F.er&&r.er!==F.er)return 0;if(F.pt&&r.pt!==F.pt)return 0;return 1})}

function fm(n){if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return Math.round(n/1e3)+'K';return Math.round(n).toLocaleString()}
function fe(n){return'\u20AC'+n.toLocaleString()}
function gb(r,k){var m={};r.forEach(function(x){m[x[k]]=(m[x[k]]||0)+1});return Object.keys(m).map(function(l){return{l:l,v:m[l]}}).sort(function(a,b){return b.v-a.v})}
function ga(r,k,s){var m={},c={};r.forEach(function(x){m[x[k]]=(m[x[k]]||0)+x[s];c[x[k]]=(c[x[k]]||0)+1});return Object.keys(m).map(function(l){return{l:l,v:Math.round(m[l]/c[l])}}).sort(function(a,b){return b.v-a.v})}

function bar(d,c,w){var mx=0;d.forEach(function(x){if(x.v>mx)mx=x.v});if(!mx)mx=1;return d.slice(0,15).map(function(x,i){return'<div class="bw"><div class="bl" style="width:'+(w||90)+'px">'+x.l+'</div><div class="bt"><div class="bf" style="width:'+(x.v/mx*100).toFixed(1)+'%;background:'+(c||CL[i%CL.length])+'"><span class="bv">'+fm(x.v)+'</span></div></div></div>'}).join('')}

function donut(d,cl){var t=0;d.forEach(function(x){t+=x.v});if(!t)t=1;var cu=0,cols=cl||CL;var p=d.map(function(x,i){var st=cu*360;cu+=x.v/t;return ap(80,80,58,36,st,cu*360,cols[i%cols.length])}).join('');var lg=d.map(function(x,i){return'<div class="di"><div class="dd" style="background:'+cols[i%cols.length]+'"></div>'+x.l+': '+x.v+' ('+(x.v/t*100).toFixed(0)+'%)</div>'}).join('');return'<div class="dc"><svg viewBox="0 0 160 160" width="140" height="140">'+p+'<text x="80" y="76" text-anchor="middle" fill="#D4A017" font-size="20" font-family="Bebas Neue" letter-spacing="1">'+t+'</text><text x="80" y="92" text-anchor="middle" fill="#7A8599" font-size="7.5" font-family="Inter" font-weight="600" letter-spacing="1.5">TOTAL</text></svg><div class="dl">'+lg+'</div></div>'}

function sparkline(data,c){var mx=Math.max.apply(null,data),mn=Math.min.apply(null,data);var w=120,h=24;var pts=data.map(function(v,i){var x=(i/(data.length-1))*w,y=h-((v-mn)/((mx-mn)||1))*h;return x+','+y}).join(' ');return'<svg viewBox="0 0 '+w+' '+h+'" style="width:100%;height:24px"><polyline points="'+pts+'" fill="none" stroke="'+(c||'#D4A017')+'" stroke-width="1.5"/></svg>'}

function scatter(data,xK,yK,xL,yL){var w=640,h=260,p=42;var xs=data.map(function(d){return d[xK]}),ys=data.map(function(d){return d[yK]});var xn=Math.min.apply(null,xs),xx=Math.max.apply(null,xs),yn=Math.min.apply(null,ys),yx=Math.max.apply(null,ys);var grid='';for(var i=0;i<5;i++){var gy=p+(i/4)*(h-p*2);grid+='<line x1="'+p+'" y1="'+gy+'" x2="'+(w-p)+'" y2="'+gy+'" stroke="#2A3349" stroke-width=".5"/>'}var selCar=all[sel];var pts=data.map(function(d,i){var idx=all.indexOf(d);var isSel=idx===sel;var x=p+((d[xK]-xn)/(xx-xn||1))*(w-p*2),y=h-p-((d[yK]-yn)/(yx-yn||1))*(h-p*2);return'<circle cx="'+x+'" cy="'+y+'" r="'+(isSel?7:3.5)+'" fill="'+(isSel?'#F5C84C':'#D4A017')+'" opacity="'+(isSel?1:.55)+'" style="cursor:pointer" onclick="sel='+idx+';renderAll()"><title>'+d.b+' '+d.m+'</title></circle>'}).join('');return'<svg viewBox="0 0 '+w+' '+(h+15)+'" style="width:100%;height:'+(h+15)+'px">'+grid+'<text x="'+(w/2)+'" y="'+(h+12)+'" text-anchor="middle" fill="#7A8599" font-size="9">'+xL+'</text><text x="8" y="'+(h/2)+'" text-anchor="middle" fill="#7A8599" font-size="9" transform="rotate(-90,8,'+(h/2)+')">'+yL+'</text>'+pts+'</svg>'}

function opt(a,s){return a.map(function(x){return'<option value="'+x+'"'+(s===x?' selected':'')+'>'+x+'</option>'}).join('')}
function slicer(){return'<div class="fl"><div class="fl-t">\u2699 FILTERS</div><div class="fg"><label>Brand</label><select onchange="F.b=this.value;af()"><option value="">All</option>'+opt(EV.B,F.b)+'</select></div><div class="fg"><label>Body</label><select onchange="F.bs=this.value;af()"><option value="">All</option>'+opt(EV.BS,F.bs)+'</select></div><div class="fg"><label>Segment</label><select onchange="F.sg=this.value;af()"><option value="">All</option>'+opt(EV.SG,F.sg)+'</select></div><div class="fg"><label>Energy</label><select onchange="F.er=this.value;af()"><option value="">All</option>'+opt(EV.ER,F.er)+'</select></div><div class="fg"><label>Powertrain</label><select onchange="F.pt=this.value;af()"><option value="">All</option>'+opt(EV.PT,F.pt)+'</select></div><button class="rst" onclick="rf()">\u21BA Reset</button></div>'}

function kpiCard(val,lab,trend,spark,color){return'<div class="kc"><div class="kc-h"><div><div class="kv">'+val+'</div><div class="kl">'+lab+'</div></div>'+(trend?'<div class="kt">'+trend+'</div>':'')+'</div>'+(spark?'<div class="kspark">'+sparkline(spark,color||'#D4A017')+'</div>':'')+'</div>'}

function kpis(r){
  if(!r.length)return'<div class="kr"><div class="kc"><div class="kv">0</div><div class="kl">No Data</div></div></div>';
  var n=r.length;
  var ap=0,ar=0,ae=0,aa=0,mxR=0,mnP=Infinity;
  r.forEach(function(x){ap+=x.p;ar+=x.rng;ae+=x.eff;aa+=x.a;if(x.rng>mxR)mxR=x.rng;if(x.p<mnP)mnP=x.p});
  // Generate pseudo sparklines from data distribution
  var priceBuckets=[0,0,0,0,0,0,0,0];
  r.forEach(function(x){var b=Math.min(7,Math.floor((x.p-20000)/25000));if(b>=0)priceBuckets[b]++});
  var rangeBuckets=[0,0,0,0,0,0,0,0];
  r.forEach(function(x){var b=Math.min(7,Math.floor(x.rng/120));if(b>=0)rangeBuckets[b]++});
  var effBuckets=[0,0,0,0,0,0,0,0];
  r.forEach(function(x){var b=Math.min(7,Math.floor((x.eff-100)/30));if(b>=0)effBuckets[b]++});
  var accelBuckets=[0,0,0,0,0,0,0,0];
  r.forEach(function(x){var b=Math.min(7,Math.floor(x.a/3));if(b>=0)accelBuckets[b]++});
  return'<div class="kr">'+
  kpiCard(n,'Total Models','103 / '+all.length,[all.length,Math.round(all.length*.9),Math.round(all.length*.7),Math.round(all.length*.85),all.length],'#25A97B')+
  kpiCard(fe(Math.round(ap/n)),'Avg Price','\u20AC',priceBuckets)+
  kpiCard(Math.round(ar/n)+'km','Avg Range','+12%',rangeBuckets,'#4A90E2')+
  kpiCard(Math.round(ae/n),'Avg Wh/km','eff',effBuckets,'#F5C84C')+
  kpiCard((aa/n).toFixed(1)+'s','Avg 0\u2013100','spd',accelBuckets,'#E74C3C')+
  kpiCard(mxR+'km','Max Range','top',rangeBuckets,'#25A97B')+
  '</div>'
}

  '<div class="vv-body"><div class="vv-img"><img src="'+img+'" alt=""/></div>'+

  '<div class="vv-spec"><div class="sl">Price</div><div class="sv g">'+fe(car.p)+'</div></div>'+

  '<div class="vv-spec"><div class="sl">Top Speed</div><div class="sv">'+car.ts+' km/h</div></div>'+
  '<div class="vv-spec"><div class="sl">Efficiency</div><div class="sv">'+car.eff+' Wh/km</div></div>'+

  '</div></div></div>'+
  '<div style="margin-top:14px;position:relative;z-index:1"><div class="p-title" style="margin-bottom:8px">\u2605 Click any vehicle below to bookmark</div><div class="chips">'+chips+'</div></div></div>'
}
